name: Visual Tests

on:
  push:
    branches:
      - main
    paths:
      - "packages/gofish-graphics/**"
      - "packages/gofish-python/**"
      - "tests/**"
      - "__snapshots__/**"

  pull_request:
    paths:
      - "packages/gofish-graphics/**"
      - "packages/gofish-python/**"
      - "tests/**"
      - "__snapshots__/**"

jobs:
  visual-test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: pnpm install

      - name: Install Python dependencies
        run: pip install -e packages/gofish-python

      - name: Build gofish-graphics
        run: pnpm --filter gofish-graphics build

      - name: Install Playwright browsers
        run: pnpm --filter @gofish/tests exec playwright install --with-deps chromium

      - name: Run visual tests (JS only)
        run: pnpm test:visual:js

      - name: Upload diff report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-report
          path: tests/tmp/diff-report.html

      - name: Build review site
        if: failure()
        run: pnpm --filter @gofish/tests build:review-site
        env:
          REVIEW_REPO: ${{ github.repository }}
          REVIEW_BRANCH: ${{ github.head_ref || github.ref_name }}
          REVIEW_SHA: ${{ github.sha }}

      - name: Deploy review site to Cloudflare Pages
        if: failure()
        id: deploy-review
        run: |
          output=$(npx wrangler@latest --cwd tests/tmp/review-site pages deploy . \
            --project-name=gofish-visual-review \
            --branch="${{ github.head_ref || github.ref_name }}" \
            --commit-dirty=true 2>&1) || { echo "$output"; exit 1; }
          echo "$output"
          url=$(echo "$output" | grep -oE 'https://[a-zA-Z0-9._-]+\.pages\.dev[a-zA-Z0-9._/-]*' | tail -1)
          echo "deployment-url=$url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NO_COLOR: "1"

      - name: Comment PR with review URL
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-review.outputs.deployment-url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Visual Diff Review\n\nVisual tests failed. [**Open Review App**](${url})\n\nAccept or reject changes from the web — accepted diffs commit directly to this branch.`
            });

      - name: Check Python story sync
        if: github.event_name == 'pull_request'
        run: pnpm test:visual:check-sync
