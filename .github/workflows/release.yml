name: Release

# One-click release: bumps gofish-graphics, publishes to npm with the
# default `latest` tag, commits the version bump back to main, tags
# the commit, and creates a GitHub release with auto-generated notes.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write # OIDC for npm trusted publisher
      contents: write # push version-bump commit + tag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        id: bump
        working-directory: packages/gofish-graphics
        run: |
          NEW=$(npm version --no-git-tag-version "${{ inputs.bump }}")
          VERSION="${NEW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Build gofish-graphics
        run: pnpm --filter gofish-graphics build

      - name: Publish to npm
        working-directory: packages/gofish-graphics
        run: npm publish --access public

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/gofish-graphics/package.json
          git commit -m "chore(release): v${VERSION}"
          git tag "${TAG}"
          git push origin HEAD:main
          git push origin "${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.bump.outputs.tag }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          gh release create "${TAG}" \
            --title "v${VERSION}" \
            --generate-notes
