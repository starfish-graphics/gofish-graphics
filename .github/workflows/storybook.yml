name: Storybook CI

## Run chromatic only when there are changes in packages/gofish-graphics/
on:
  push:
    branches:
      - main
    paths:
      - "packages/gofish-graphics/**"

  pull_request:
    paths:
      - "packages/gofish-graphics/**"

jobs:
  chromatic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Required for Chromatic to track git history

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build gofish-graphics library
        run: pnpm --filter gofish-graphics build

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: chpt_b7e06495d0d4585
          workingDir: packages/gofish-graphics
          buildScriptName: build-storybook
          onlyChanged: true # Only test stories that changed
          autoAcceptChanges: "main"
