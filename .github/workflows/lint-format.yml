name: Lint And Format Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Collect changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "$BASE_REF" --depth=1
            CHANGED="$(git diff --name-only --diff-filter=ACMRT "origin/$BASE_REF"...HEAD)"
          else
            CHANGED="$(git diff --name-only --diff-filter=ACMRT HEAD~1 HEAD)"
          fi

          ESLINT_FILES="$(
            printf '%s\n' "$CHANGED" \
              | grep -E '\.(js|mjs|cjs|ts|mts|cts|tsx)$' \
              | tr '\n' ' ' \
              | sed 's/[[:space:]]*$//' || true
          )"
          PRETTIER_FILES="$(
            printf '%s\n' "$CHANGED" \
              | grep -E '\.(js|mjs|cjs|ts|mts|cts|tsx|json|ya?ml|md|css|html|vue)$' \
              | grep -v '^__snapshots__/' \
              | grep -v '^tests/tmp/' \
              | tr '\n' ' ' \
              | sed 's/[[:space:]]*$//' || true
          )"

          {
            echo "eslint_files<<EOF"
            echo "$ESLINT_FILES"
            echo "EOF"
            echo "prettier_files<<EOF"
            echo "$PRETTIER_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run ESLint on changed files
        if: steps.changed.outputs.eslint_files != ''
        run: pnpm exec eslint ${{ steps.changed.outputs.eslint_files }}

      - name: Check Prettier on changed files
        if: steps.changed.outputs.prettier_files != ''
        run: pnpm exec prettier --check ${{ steps.changed.outputs.prettier_files }}
